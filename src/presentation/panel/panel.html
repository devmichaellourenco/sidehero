<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side Hero</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app" class="game-scroll">
      <header class="header">
        <div class="brand">
          <img
            id="brand-icon"
            class="brand-icon"
            src="assets/ui/brand.png"
            alt="Side Hero"
          />
          <div>
            <h1>Side Hero</h1>
            <p class="subtitle">Idle RPG no painel lateral do Chrome</p>
          </div>
          <button id="open-settings-btn" class="settings-btn" type="button" aria-label="Configurações" title="Configurações">
            ⚙
          </button>
        </div>
        <div class="stats-bar">
          <span id="gold-label" class="stat-pill">0</span>
          <span id="chest-label" class="stat-pill">0</span>
          <span id="chest-progress-label" class="stat-pill">0/3</span>
        </div>
      </header>

      <section id="pending-actions-bar" class="pending-actions-bar hidden" aria-live="polite"></section>

      <section id="campaign-context-bar" class="campaign-context-bar" aria-label="Campanha">
        <span
          id="campaign-context-label"
          class="stat-pill campaign-context-pill"
          data-campaign-tooltip
          tabindex="0"
        ></span>
      </section>

      <section id="season-complete-banner" class="season-complete-banner hidden" aria-live="polite">
        <div class="season-complete-copy">
          <strong>🏆 Temporada concluída!</strong>
          <span>Você derrotou o boss final. Inicie um novo jogo para recomeçar do zero.</span>
        </div>
        <button id="new-game-btn" class="btn primary" type="button">Novo Jogo</button>
      </section>

      <section class="battle-strip" aria-label="Campo de batalha">
        <div class="strip-bg"></div>
        <div id="heroes-container" class="heroes-row"></div>
        <div id="enemy-container" class="enemy-slot"></div>
        <div id="battle-float-layer" class="battle-float-layer" aria-hidden="true"></div>
        <div id="battle-victory-overlay" class="battle-victory-overlay hidden" aria-live="polite"></div>
        <button
          id="battle-chest-affordance"
          type="button"
          class="battle-chest-affordance hidden"
          aria-label="Abrir baú"
          title="Abrir baú"
        >
          <span id="battle-chest-badge" class="battle-chest-badge hidden">0</span>
        </button>
        <div class="strip-floor"></div>
      </section>

      <div class="battle-combat-bar">
        <button
          id="pause-loadout-btn"
          class="combat-bar-btn"
          type="button"
          aria-label="Pausar para ajustes"
          title="Pausar para ajustes — a fase reinicia ao continuar"
        >
          <span class="combat-bar-btn-icon" aria-hidden="true">⏸</span>
          <span class="combat-bar-btn-label">Pausar</span>
        </button>
        <button
          id="continue-loadout-btn"
          class="combat-bar-btn combat-bar-btn--continue hidden"
          type="button"
          aria-label="Continuar batalha"
          title="Continuar batalha — a fase reinicia do início"
        >
          <span class="combat-bar-btn-icon" aria-hidden="true">▶</span>
          <span class="combat-bar-btn-label">Continuar</span>
        </button>
      </div>

      <section id="phase-intermission-banner" class="phase-intermission-banner phase-intermission-banner--compact hidden" aria-live="polite">
        <strong id="phase-intermission-title">Pausado</strong>
        <button
          id="phase-intermission-info"
          type="button"
          class="info-chip-btn"
          aria-label="Informações sobre a pausa"
          title="Ajuste party, equipamentos e skills. A fase atual reiniciará do início ao continuar."
        >
          ℹ
        </button>
      </section>

      <section class="panel heroes-panel">
        <h2>Heróis</h2>
        <div id="hero-panels" class="heroes-panel-body game-scroll"></div>
      </section>

      <footer class="actions">
        <div class="actions-icon-bar" aria-label="Sistemas do jogo">
          <button id="open-battle-log-btn" class="action-icon-btn" type="button" title="Log de batalha" aria-label="Log de batalha" aria-expanded="false">
            <span class="action-icon-glyph" aria-hidden="true">📜</span>
          </button>
          <button id="open-campaign-btn" class="action-icon-btn" type="button" title="Campanha" aria-label="Campanha">
            <img class="btn-icon" src="assets/ui/stage.png" alt="" aria-hidden="true" />
          </button>
          <button id="open-shop-btn" class="action-icon-btn" type="button" title="Loja" aria-label="Loja">
            <img class="btn-icon" src="assets/ui/gold.png" alt="" aria-hidden="true" />
          </button>
          <button id="open-inventory-btn" class="action-icon-btn" type="button" title="Inventário" aria-label="Inventário">
            <img class="btn-icon" src="assets/ui/inventory.png" alt="" aria-hidden="true" />
          </button>
          <button id="optimize-loadout-btn" class="action-icon-btn hidden" type="button" title="Otimizar equipe" aria-label="Otimizar equipe">
            ⬆
          </button>
          <button id="open-upgrades-btn" class="action-icon-btn" type="button" title="Melhorias" aria-label="Melhorias">
            ★
          </button>
          <button id="open-chest-btn" class="action-icon-btn action-icon-btn--chest" type="button" disabled title="Abrir baú" aria-label="Abrir baú">
            <img class="btn-icon" src="assets/ui/chest.png" alt="" aria-hidden="true" />
          </button>
          <button id="open-all-chests-btn" class="action-icon-btn hidden" type="button" title="Abrir todos os baús" aria-label="Abrir todos os baús">
            <img class="btn-icon" src="assets/ui/chest.png" alt="" aria-hidden="true" />
          </button>
        </div>
      </footer>
    </div>

    <div id="battle-log-overlay" class="battle-log-overlay hidden" aria-hidden="true">
      <div class="battle-log-backdrop" data-battle-log-close></div>
      <section class="battle-log-floating panel" aria-label="Log de batalha">
        <div class="battle-log-header">
          <h2>Log de Batalha</h2>
          <button id="battle-log-close" type="button" class="battle-log-close-btn" aria-label="Fechar log">×</button>
        </div>
        <ul id="battle-log" class="battle-log-list game-scroll"></ul>
      </section>
    </div>

    <div id="hero-drawer-root" class="hero-drawer-root hidden" aria-hidden="true">
      <div class="hero-drawer-backdrop" data-drawer-close></div>
      <aside class="hero-drawer-panel" role="dialog" aria-modal="true" aria-labelledby="hero-drawer-title">
        <header class="hero-drawer-header">
          <button type="button" class="hero-drawer-nav" data-hero-drawer-prev aria-label="Herói anterior">←</button>
          <h2 id="hero-drawer-title" class="hero-drawer-title"></h2>
          <button type="button" class="hero-drawer-nav" data-hero-drawer-next aria-label="Próximo herói">→</button>
          <button type="button" class="hero-drawer-close" data-drawer-close aria-label="Fechar">×</button>
        </header>
        <div id="hero-drawer-body" class="hero-drawer-body game-scroll"></div>
      </aside>
    </div>

    <div id="modal-root" class="modal-root hidden" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <header class="modal-header">
          <button type="button" class="modal-back hidden" data-modal-back aria-label="Voltar">←</button>
          <h2 id="modal-title" class="modal-title"></h2>
          <button type="button" class="modal-close" data-modal-close aria-label="Fechar">×</button>
        </header>
        <div id="modal-body" class="modal-body game-scroll"></div>
      </div>
    </div>

    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="panel.js"></script>
  </body>
</html>
