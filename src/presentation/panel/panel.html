<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Side Hero</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <div id="app" class="game-scroll">
      <header class="header">
        <div class="brand">
          <img
            id="brand-icon"
            class="brand-icon"
            src="assets/ui/brand.png"
            alt="Side Hero"
          />
          <div>
            <h1>Side Hero</h1>
            <p class="subtitle">Idle RPG no painel lateral</p>
          </div>
        </div>
        <div class="stats-bar">
          <span id="stage-label" class="stat-pill">Stage 1</span>
          <span id="gold-label" class="stat-pill">0</span>
          <span id="chest-label" class="stat-pill">0</span>
        </div>
      </header>

      <section class="battle-strip" aria-label="Campo de batalha">
        <div class="strip-bg"></div>
        <div id="heroes-container" class="heroes-row"></div>
        <div id="enemy-container" class="enemy-slot"></div>
        <div class="strip-floor"></div>
      </section>

      <section class="panels">
        <div class="panel">
          <h2>Heróis</h2>
          <div id="hero-panels" class="game-scroll"></div>
        </div>

        <div class="panel">
          <h2>Inventário</h2>
          <div id="inventory-list" class="inventory-list game-scroll"></div>
        </div>
      </section>

      <section class="panel log-panel">
        <h2>Log de Batalha</h2>
        <ul id="battle-log" class="game-scroll"></ul>
      </section>

      <footer class="actions">
        <button id="tick-btn" class="btn primary">
          <img class="btn-icon" src="assets/ui/energy.png" alt="" aria-hidden="true" />
          Avançar Batalha
        </button>
        <button id="open-chest-btn" class="btn secondary" disabled>
          <img class="btn-icon" src="assets/ui/chest.png" alt="" aria-hidden="true" />
          Abrir Baú
        </button>
      </footer>
    </div>

    <script type="module" src="panel.js"></script>
  </body>
</html>
